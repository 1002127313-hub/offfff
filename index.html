<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>כרטיס גירוד אינטראקטיבי</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f0f2f5;
            --card-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
        }

        p {
            color: #7f8c8d;
            font-size: 1.1rem;
        }

        .scratch-card-wrapper {
            position: relative;
            width: 320px;
            height: 320px;
            background: white;
            padding: 10px;
            border-radius: 20px;
            box-shadow: var(--card-shadow);
        }

        .scratch-container {
            position: relative;
            width: 100%;
            height: 100%;
            user-select: none;
            border-radius: 12px;
            overflow: hidden;
            background: #eee;
        }

        /* התמונה שתתגלה */
        .scratch-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* שכבת הגירוד */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle></svg>'), auto;
            touch-action: none;
            transition: opacity 0.5s ease;
        }

        .controls {
            margin-top: 30px;
            display: flex;
            gap: 15px;
        }

        button {
            padding: 12px 25px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s;
            background-color: var(--primary-color);
            color: white;
            box-shadow: 0 4px 15px rgba(74, 144, 226, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(74, 144, 226, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .message {
            margin-top: 20px;
            font-weight: bold;
            color: #27ae60;
            height: 24px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .message.visible {
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>הפתעה מחכה לך! 🎁</h1>
        <p>גרד את הכרטיס כדי לגלות מה מסתתר מתחת...</p>
    </div>

    <div class="scratch-card-wrapper">
        <div class="scratch-container" id="container">
            <!-- שימוש בתמונה אמיתית מרשת האינטרנט כדוגמה -->
            <img src="https://picsum.photos/600/600?random=1" alt="הפתעה" id="hiddenImage">
            <canvas id="scratchCanvas"></canvas>
        </div>
    </div>

    <div class="message" id="winMessage">איזה יופי! גילית את כל התמונה! 🎉</div>

    <div class="controls">
        <button onclick="resetGame()">כרטיס חדש</button>
    </div>

    <script>
        const canvas = document.getElementById('scratchCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const container = document.getElementById('container');
        const winMessage = document.getElementById('winMessage');
        let isDrawing = false;
        let isFinished = false;

        // הגדרת גודל הקנבס לפי המיכל שלו
        function initCanvas() {
            canvas.width = container.offsetWidth;
            canvas.height = container.offsetHeight;
            
            // מילוי רקע אפור מטאלי
            const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            gradient.addColorStop(0, '#bdc3c7');
            gradient.addColorStop(0.5, '#95a5a6');
            gradient.addColorStop(1, '#7f8c8d');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // הוספת דוגמה של נקודות כדי שייראה כמו כרטיס אמיתי
            ctx.fillStyle = 'rgba(255,255,255,0.1)';
            for(let i=0; i<100; i++) {
                ctx.beginPath();
                ctx.arc(Math.random()*canvas.width, Math.random()*canvas.height, 1, 0, Math.PI*2);
                ctx.fill();
            }

            // טקסט הנחיה
            ctx.fillStyle = '#2c3e50';
            ctx.font = 'bold 24px system-ui';
            ctx.textAlign = 'center';
            ctx.fillText('גרד כאן!', canvas.width / 2, canvas.height / 2);
            
            isFinished = false;
            canvas.style.opacity = '1';
            winMessage.classList.remove('visible');
        }

        // פונקציה לבדיקת אחוז הגירוד
        function checkProgress() {
            if (isFinished) return;

            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const pixels = imageData.data;
            let transparentPixels = 0;

            for (let i = 3; i < pixels.length; i += 4) {
                if (pixels[i] === 0) {
                    transparentPixels++;
                }
            }

            const percent = (transparentPixels / (pixels.length / 4)) * 100;
            
            // אם המשתמש גירד יותר מ-50%, נחשוף הכל
            if (percent > 50) {
                isFinished = true;
                canvas.style.opacity = '0';
                setTimeout(() => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    winMessage.classList.add('visible');
                }, 500);
            }
        }

        function getCoordinates(e) {
            const rect = canvas.getBoundingClientRect();
            let x, y;

            if (e.touches) {
                x = e.touches[0].clientX - rect.left;
                y = e.touches[0].clientY - rect.top;
            } else {
                x = e.clientX - rect.left;
                y = e.clientY - rect.top;
            }
            return { x, y };
        }

        function scratch(e) {
            if (!isDrawing || isFinished) return;

            const { x, y } = getCoordinates(e);

            ctx.globalCompositeOperation = 'destination-out';
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';
            ctx.lineWidth = 40; // עובי הגירוד

            ctx.beginPath();
            if (this.lastX && this.lastY) {
                ctx.moveTo(this.lastX, this.lastY);
            } else {
                ctx.moveTo(x, y);
            }
            ctx.lineTo(x, y);
            ctx.stroke();

            this.lastX = x;
            this.lastY = y;
            
            checkProgress();
        }

        function startDrawing(e) {
            isDrawing = true;
            const { x, y } = getCoordinates(e);
            this.lastX = x;
            this.lastY = y;
            scratch.call(this, e);
        }

        function stopDrawing() {
            isDrawing = false;
            this.lastX = null;
            this.lastY = null;
        }

        function resetGame() {
            // החלפת תמונה בכל פעם שמתחילים מחדש
            const img = document.getElementById('hiddenImage');
            img.src = `https://picsum.photos/600/600?random=${Math.random()}`;
            initCanvas();
        }

        // חיבור אירועים
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', scratch);
        window.addEventListener('mouseup', stopDrawing);

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startDrawing.call(canvas, e);
        }, { passive: false });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            scratch.call(canvas, e);
        }, { passive: false });
        
        canvas.addEventListener('touchend', stopDrawing);

        // אתחול ראשוני
        window.onload = initCanvas;
    </script>
</body>
</html>
